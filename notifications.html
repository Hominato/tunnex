<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications - Compressive Savings Bank of Texas Digital</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/responsive.css">
  <meta name="color-scheme" content="light dark">
  <script>
    { const t = localStorage.getItem("theme"); if (t === 'dark' || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) document.documentElement.setAttribute('data-theme','dark'); else if (t === 'light') document.documentElement.setAttribute('data-theme','light'); }
  </script>
  <style>
    .notification-item { display:flex; gap:16px; padding:20px 24px; border-bottom:1px solid var(--border-color); transition:background var(--transition-fast); cursor:pointer; }
    .notification-item:hover { background:rgba(0,0,0,0.01); }
    [data-theme="dark"] .notification-item:hover { background:rgba(255,255,255,0.01); }
    .notification-item.unread { border-left:3px solid var(--primary-color); background:var(--primary-light); }
    .notification-icon-wrap { width:44px; height:44px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1.1rem; }
    .notification-body { flex:1; }
    .notification-title { font-weight:600; color:var(--text-primary); font-size:0.95rem; margin-bottom:4px; }
    .notification-desc { font-size:0.85rem; color:var(--text-secondary); line-height:1.5; }
    .notification-time { font-size:0.75rem; color:var(--text-muted); margin-top:6px; }
  </style>
</head>
<body>
  <div class="app-container">
    <div id="sidebar-target"></div>
    <main class="main-content">
      <div id="topbar-target" data-title="Notifications" data-subtitle="All system alerts and account activity messages"></div>

      <div class="glass" style="margin-bottom:24px; padding:20px 24px; display:flex; justify-content:space-between; align-items:center;">
        <div style="display:flex; gap:12px; align-items:center;">
          <span id="unread-count-badge" class="badge badge-danger">0 Unread</span>
          <button class="btn btn-secondary" id="mark-all-btn"><i class="fas fa-check-double"></i> Mark All Read</button>
        </div>
        <button class="btn btn-outline" id="clear-all-btn"><i class="fas fa-trash-alt"></i> Clear All</button>
      </div>

      <div class="glass" style="padding:0; overflow:hidden;">
        <div id="notifications-list"></div>
        <div id="notif-empty" class="empty-state hidden">
          <div class="empty-state-icon"><i class="far fa-bell-slash"></i></div>
          <h3>All quiet here</h3>
          <p>No notifications yet. Make a transfer or deposit to receive alerts.</p>
        </div>
      </div>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/email.js"></script>
  <script src="js/app.js"></script>
  <script src="js/notifications.js"></script>
</body>
</html>
