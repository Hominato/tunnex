<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deposit Funds - Compressive Savings Bank of Texas Digital</title>
  
  <!-- Font Awesome & Google Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Style sheets -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <!-- Prevent Theme Flash (FOUC) -->
  <meta name="color-scheme" content="light dark">
  <script>
    {
      const colorScheme = localStorage.getItem("theme");
      if (colorScheme === 'dark' || (!colorScheme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else if (colorScheme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    }
  </script>
</head>
<body>

  <div class="app-container">
    
    <!-- Sidebar (Injected dynamically) -->
    <div id="sidebar-target"></div>
    
    <!-- Main content screen -->
    <main class="main-content">
      
      <!-- Top bar (Injected dynamically) -->
      <div id="topbar-target" data-title="Deposit Funds" data-subtitle="Fund your simulated account immediately"></div>
      
      <!-- Current balance card -->
      <div class="glass" style="padding:24px; display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <div>
          <span style="font-size:0.8rem; color:var(--text-muted); display:block; text-transform:uppercase;">Current Balance</span>
          <strong id="current-balance" style="font-size:1.6rem; color:var(--text-primary);">$0.00</strong>
        </div>
        <div class="badge badge-success"><i class="fas fa-piggy-bank"></i> Sandbox deposits active</div>
      </div>

      <!-- Deposit form -->
      <div class="glass" style="max-width:600px; padding:40px;">
        <h3 style="margin-bottom:20px; font-size:1.25rem;">Enter Deposit Information</h3>
        
        <form id="deposit-form" novalidate>
          
          <div class="form-group">
            <label for="amount" class="form-label">Deposit Amount ($)</label>
            <div class="input-container">
              <i class="fas fa-money-bill-wave"></i>
              <input 
                type="number" 
                id="amount" 
                class="form-input input-with-icon" 
                placeholder="e.g. 25000" 
                required 
                min="500" 
                max="5000000"
              >
              <span class="error-msg">Deposit amount must be between $500 and $5,000,000.</span>
            </div>
          </div>

          <!-- Quick Select buttons -->
          <div style="margin-bottom:30px;">
            <span class="form-label" style="display:block; margin-bottom:10px;">Quick Presets</span>
            <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:12px;">
              <button type="button" class="btn btn-outline preset-btn" data-val="5000">+ $5,000</button>
              <button type="button" class="btn btn-outline preset-btn" data-val="10000">+ $10,000</button>
              <button type="button" class="btn btn-outline preset-btn" data-val="25000">+ $25,000</button>
              <button type="button" class="btn btn-outline preset-btn" data-val="50000">+ $50,000</button>
            </div>
          </div>
          
          <div class="form-group">
            <label for="description" class="form-label">Description (Optional)</label>
            <input type="text" id="description" class="form-input" placeholder="e.g. Sandbox Top up">
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%; padding:14px;"><i class="fas fa-check-circle"></i> Confirm Deposit</button>
          
        </form>
      </div>

    </main>
    
  </div>

  <!-- DB scripts -->
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/email.js"></script>
  <script src="js/app.js"></script>
  <script src="js/deposit.js"></script>
</body>
</html>
