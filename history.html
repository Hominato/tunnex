<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transaction History - Compressive Savings Bank of Texas Digital</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/responsive.css">
  <meta name="color-scheme" content="light dark">
  <script>
    { const t = localStorage.getItem("theme"); if (t === 'dark' || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) document.documentElement.setAttribute('data-theme','dark'); else if (t === 'light') document.documentElement.setAttribute('data-theme','light'); }
  </script>
  <style>
    .filter-bar { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:24px; }
    .export-bar { display:flex; gap:12px; margin-bottom:16px; }
    .pagination { display:flex; gap:8px; align-items:center; justify-content:center; margin-top:24px; }
    .page-btn { width:36px; height:36px; border-radius:var(--radius-sm); border:1px solid var(--border-color); background:var(--bg-card); color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:0.85rem; transition:all var(--transition-fast); }
    .page-btn.active, .page-btn:hover { background:var(--primary-color); color:white; border-color:var(--primary-color); }
    @media print {
      .no-print { display:none!important; }
      .main-content { padding: 20px!important; }
      .glass { border:1px solid #ccc!important; background:none!important; box-shadow:none!important; backdrop-filter:none!important; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div id="sidebar-target"></div>
    <main class="main-content">
      <div id="topbar-target" data-title="Transaction History" data-subtitle="Complete audit trail of all banking activity"></div>

      <!-- Print Header (hidden on screen) -->
      <div class="print-only" style="display:none; margin-bottom:24px;">
        <h2 style="font-size:1.5rem;">Compressive Savings Bank of Texas Account Statement</h2>
        <p id="print-user-info"></p>
        <p>Generated: <strong id="print-date"></strong></p>
      </div>

      <!-- Filter & Search Bar -->
      <div class="glass no-print" style="padding:24px; margin-bottom:24px;">
        <div class="filter-bar">
          <div class="input-container" style="flex:1; min-width:200px;">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" class="form-input input-with-icon" placeholder="Search by ID, name, description...">
          </div>
          <div class="select-wrapper" style="min-width:160px;">
            <select id="type-filter" class="form-select">
              <option value="">All Types</option>
              <option value="deposit">Deposits</option>
              <option value="withdraw">Withdrawals</option>
              <option value="transfer-sent">Transfers Sent</option>
              <option value="transfer-received">Transfers Received</option>
            </select>
          </div>
          <div class="select-wrapper" style="min-width:160px;">
            <select id="sort-select" class="form-select">
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
              <option value="highest">Highest Amount</option>
              <option value="lowest">Lowest Amount</option>
            </select>
          </div>
          <button class="btn btn-outline" onclick="resetFilters()"><i class="fas fa-undo"></i> Reset</button>
        </div>
        <div class="export-bar">
          <button class="btn btn-secondary" onclick="exportCSV()"><i class="fas fa-file-csv"></i> Export CSV</button>
          <button class="btn btn-secondary" onclick="window.print()"><i class="fas fa-print"></i> Print Statement</button>
        </div>
        <div style="font-size:0.85rem; color:var(--text-muted);">Showing <strong id="result-count">0</strong> transactions</div>
      </div>

      <!-- Transactions Table -->
      <div class="glass" style="padding:0; overflow:hidden;">
        <div class="table-responsive">
          <table>
            <thead>
              <tr style="background:rgba(0,0,0,0.02);">
                <th style="padding:16px;">ID</th>
                <th style="padding:16px;">Date</th>
                <th style="padding:16px;">Description</th>
                <th style="padding:16px;">Counterparty</th>
                <th style="padding:16px;">Type</th>
                <th style="padding:16px; text-align:right;">Amount</th>
              </tr>
            </thead>
            <tbody id="history-table-body"></tbody>
          </table>
        </div>
        <div id="history-empty" class="empty-state hidden">
          <div class="empty-state-icon"><i class="fas fa-file-invoice"></i></div>
          <h3>No transactions match</h3>
          <p>Adjust your filters or make a deposit to see history here.</p>
        </div>
        <div class="pagination no-print" id="pagination-bar" style="padding:20px;"></div>
      </div>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/email.js"></script>
  <script src="js/app.js"></script>
  <script src="js/history.js"></script>
</body>
</html>
